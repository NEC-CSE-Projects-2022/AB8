<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="wpoceans">
    <link rel="shortcut icon" type="image/png" href="static/assets/images/favicon.png">
    <title>Sign Up</title>
    <link href="static/assets/css/themify-icons.css" rel="stylesheet">
    <link href="static/assets/css/flaticon.css" rel="stylesheet">
    <link href="static/assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="static/assets/css/animate.css" rel="stylesheet">
    <link href="static/assets/css/owl.carousel.css" rel="stylesheet">
    <link href="static/assets/css/owl.theme.css" rel="stylesheet">
    <link href="static/assets/css/slick.css" rel="stylesheet">
    <link href="static/assets/css/slick-theme.css" rel="stylesheet">
    <link href="static/assets/css/swiper.min.css" rel="stylesheet">
    <link href="static/assets/css/owl.transitions.css" rel="stylesheet">
    <link href="static/assets/css/jquery.fancybox.css" rel="stylesheet">
    <link href="static/assets/css/odometer-theme-default.css" rel="stylesheet">
    <link href="static/assets/sass/style.css" rel="stylesheet">
    <link href="static/assets/css/signup-custom.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="static/assets/css/shared-styles.css" rel="stylesheet">
</head>
<body>

    <div class="page-wrapper">
        <section class="signup-hero">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-lg-6">
                        <div class="signup-form-box">
                            <h3>Create Your Account</h3>
                            <form action="/signup" method="GET">
                                <label for="username">Username</label>
                                <input type="text" class="form-control" name="user" placeholder="Username" required pattern="[A-Za-z].{6,}" title="Six or more Uppercase and lowercase letter req.">
                                <label for="name">Name</label>
                                <input type="text" class="form-control" name="name" placeholder="Name" required>
                                <label for="email">Email</label>
                                <input type="email" class="form-control" name="email" placeholder="Email" required pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$">
                                <label for="mobile">Mobile</label>
                                <input type="text" class="form-control" name="mobile" placeholder="Mobile" required pattern="[6-9]{1}[0-9]{9}" title="Phone number with 7-9 and remaing 9 digit with 0-9">
                                <label for="password">Password</label>
                                <input type="password" class="form-control" name="password" placeholder="Password" required pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one  number and one uppercase and lowercase letter, and at least 8 or more characters">
                                <button class="btn btn-primary w-100 mt-2" type="submit">Sign Up</button>
                            </form>
                            <div class="text-center mt-3">
                                <p>Already have an account? <a href="/login">Sign In</a></p>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-6 signup-img-box">
                        <img src="static/assets/d-right.png" alt="Sign Up Illustration">
                    </div>
                </div>
            </div>
        </section>
    </div>
    <script src="static/assets/js/jquery.min.js"></script>
    <script src="static/assets/js/bootstrap.bundle.min.js"></script>
    <script src="static/assets/js/modernizr.custom.js"></script>
    <script src="static/assets/js/jquery-plugin-collection.js"></script>
    <script src="static/assets/js/script.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
      var navLinks = document.querySelectorAll('.nav-link.nav-animate');
      navLinks.forEach(function(link, i) {
        link.style.opacity = 0;
        setTimeout(function() {
          link.style.transition = 'opacity 0.5s cubic-bezier(.4,2,.6,1)';
          link.style.opacity = 1;
        }, 200 + i * 120);
      });
    });
    </script>
</body>
</html>
